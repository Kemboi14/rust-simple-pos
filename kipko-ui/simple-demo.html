<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kipko POS - Dioxus UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script>
        // Simple state management
        let currentPage = 'floorplan';

        // Components as HTML strings
        const components = {
            floorplan: `
                <div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-6">Floor Plan</h2>
                    <p class="text-gray-600 mb-6">Restaurant floor plan will be displayed here</p>
                    <div class="grid grid-cols-3 gap-4">
                        <button class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-lg">
                            Table 1
                        </button>
                        <button class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 px-6 rounded-lg">
                            Table 2
                        </button>
                        <button class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-lg">
                            Table 3
                        </button>
                    </div>
                </div>
            `,
            orders: `
                <div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-6">Orders</h2>
                    <p class="text-gray-600 mb-6">Order management will be displayed here</p>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-4">
                        New Order
                    </button>
                    <div class="space-y-4">
                        <div class="bg-white p-4 rounded-lg shadow">
                            <h3 class="font-semibold">Order 1</h3>
                            <p class="text-gray-600">Table 1 - $25.50</p>
                        </div>
                        <div class="bg-white p-4 rounded-lg shadow">
                            <h3 class="font-semibold">Order 2</h3>
                            <p class="text-gray-600">Table 2 - $18.75</p>
                        </div>
                    </div>
                </div>
            `,
            menu: `
                <div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-6">Menu</h2>
                    <p class="text-gray-600 mb-6">Menu items will be displayed here</p>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-4">
                        Add Item
                    </button>
                    <div class="space-y-6">
                        <div class="bg-white p-6 rounded-lg shadow">
                            <h3 class="text-xl font-semibold mb-4">Appetizers</h3>
                            <div class="space-y-2">
                                <div class="flex justify-between">
                                    <span>Spring Rolls</span>
                                    <span>$6.99</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Salad</span>
                                    <span>$4.99</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-lg shadow">
                            <h3 class="text-xl font-semibold mb-  -4 .4">Main; "Main Courses .Courses"</; .</
                                <div class="space-y-2">
                                    <div class="flex justify-between">
                                        <span>Grilled Chicken</span>
                                        <span>$15.99</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span>Pasta</span>
                                        <span>$12.99</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-lg shadow">
                            <h3 class="text-xl font-semibold mb-4">Desserts</h3>
                            <div class="space-y-2">
                                <div class="flex justify-between">
                                    <span>Ice Cream</span>
                                    <span>$4.99</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Cake</span>
                                    <span>$5.99</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            staff: `
                <div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-6">Staff</h2>
                    <p class="text-gray-600 mb-6">Staff management will be displayed here</p>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-4">
                        Add Staff Member
                    </button>
                    <div class="space-y-4">
                        <div class="bg-white p-4 rounded-lg shadow">
                            <h3 class="font-semibold">John Doe</h3>
                            <p class="text-gray-600">Manager</p>
                        </div>
                        <div class="bg-white p-4 rounded-lg shadow">
                            <h3 class="font-semibold">Jane Smith</h3>
                            <p class="text-gray-600">Server</p>
                        </div>
                        <div class="bg-white p-4 rounded-lg shadow">
                            <h3 class="font-semibold">Mike Johnson</h3>
                            <p class="text-gray-600">Kitchen</p>
                        </div>
                    </div>
                </div>
            `
        };

        function render() {
            const header = `
                <header class="bg-blue-600 text-white shadow-lg">
                    <div class="container mx-auto px-4 py-4">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-bold">Kipko POS</h1>
                            <nav class="flex space-x-4">
                                <button onclick="navigate('floorplan')" class="nav-btn px-3 py-2 rounded hover:bg-blue-700 ${currentPage === 'floorplan' ? 'bg-blue-700' : ''}">
                                    Floor Plan
                                </button>
                                <button onclick="navigate('orders')" class="nav-btn px-3 py-2 rounded hover:bg-blue-700 ${currentPage === 'orders' ? 'bg-blue-700' : ''}">
                                    Orders
                                </button>
                                <button onclick="navigate('menu')" class="nav-btn px-3 py-2 rounded hover:bg-blue-700 ${currentPage === 'menu' ? 'bg-blue-700' : ''}">
                                    Menu
                                </button>
                                <button onclick="navigate('staff')" class="nav-btn px-3 py-2 rounded hover:bg-blue-700 ${currentPage === 'staff' ? 'bg-blue-700' : ''}">
                                    Staff
                                </button>
                            </nav>
                        </div>
                    </div>
                </header>
            `;

            const main = `
                <main class="container mx-auto px-4 py-8">
                    ${components[currentPage]}
                </main>
            `;

            document.getElementById('root').innerHTML = `
                <div class="min-h-screen bg-gray-100">
                    ${header}
                    ${main}
                </div>
            `;
        }

        function navigate(page) {
            currentPage = page;
            render();
        }

        // Initial render
        render();
    </script>
</body>
</html>
